<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Générateur de Configuration Image</title>
    <link rel="stylesheet" href="../frise.css">
    <link rel="stylesheet" href="../main_style.css">
    <link rel="stylesheet" href="../guided_visit.css">
    <!-- Load required libraries from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.20.0/dist/exif-reader.min.js"></script>
    <style>
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            text-align: center;
        }

        .upload-section {
            border: 2px dashed #ff4081;
            padding: 40px;
            text-align: center;
            border-radius: 8px;
            margin: 20px 0;
            background: #fffafa;
        }

        .upload-section p {
            color: #666;
            margin-bottom: 20px;
        }

        .results-section {
            display: none;
            margin-top: 30px;
        }

        .log-area {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            height: 150px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .downloads {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .download-btn {
            padding: 10px 20px;
            background: #ff4081;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background: #e91e63;
        }

        .home-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #ff4081;
            text-decoration: none;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            border: 1px solid #ccc;
            display: inline-block;
            padding: 10px 20px;
            cursor: pointer;
            background: #ff4081;
            color: white;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Traitement des Images (Métadonnées)</h1>

        <div class="upload-section">
            <p>Sélectionnez plusieurs images (.jpg, .jpeg) pour générer les configurations media et visits.</p>
            <label class="custom-file-upload">
                <input type="file" id="imageInput" multiple accept="image/jpeg, image/jpg, image/png" />
                Choisir les images
            </label>
        </div>

        <div id="resultsArea" class="results-section">
            <h3>Journal de traitement</h3>
            <div id="logArea" class="log-area"></div>

            <div class="downloads">
                <a id="downloadMedia" class="download-btn" style="display:none">Télécharger mediaConfig.json</a>
                <a id="downloadVisit" class="download-btn" style="display:none">Télécharger visitConfig.json</a>
            </div>
        </div>

        <a href="../index.html" class="home-link">← Retour à l'accueil</a>
    </div>

    <script src="../src/photo_processor.js"></script>
</body>

</html>
